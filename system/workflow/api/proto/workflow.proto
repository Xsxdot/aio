syntax = "proto3";

package xiaozhizhang.workflow.v1;

option go_package = "github.com/xsxdot/aio/system/workflow/api/proto;proto";

// WorkflowService 工作流服务
service WorkflowService {
  rpc CreateDef(CreateDefRequest) returns (CreateDefResponse);
  rpc StartWorkflow(StartWorkflowRequest) returns (StartWorkflowResponse);
  rpc ReportNodeCompleted(ReportNodeCompletedRequest) returns (ReportNodeCompletedResponse);
  rpc RollbackToNode(RollbackToNodeRequest) returns (RollbackToNodeResponse);
  rpc GetExecutionTrail(GetExecutionTrailRequest) returns (GetExecutionTrailResponse);
  rpc GetDef(GetDefRequest) returns (GetDefResponse);
  rpc ListDefs(ListDefsRequest) returns (ListDefsResponse);
  rpc CreateIfNotExists(CreateIfNotExistsRequest) returns (CreateIfNotExistsResponse);
  rpc GetInstance(GetInstanceRequest) returns (GetInstanceResponse);
  rpc GetInstanceStatus(GetInstanceStatusRequest) returns (GetInstanceStatusResponse);
  rpc ListInstances(ListInstancesRequest) returns (ListInstancesResponse);
  rpc CancelInstance(CancelInstanceRequest) returns (CancelInstanceResponse);
  rpc RetryNode(RetryNodeRequest) returns (RetryNodeResponse);
}

message CreateDefRequest {
  string code = 1;
  string name = 2;
  string dag_json = 3;
  int32 version = 4;
}

message CreateDefResponse {
  int64 def_id = 1;
}

message StartWorkflowRequest {
  string def_code = 1;
  string initial_data_json = 2;
  string env = 3;
}

message StartWorkflowResponse {
  int64 instance_id = 1;
}

message ReportNodeCompletedRequest {
  int64 instance_id = 1;
  string node_id = 2;
  string output_json = 3;
  string env = 4;
}

message ReportNodeCompletedResponse {
  bool success = 1;
  string message = 2;
}

message RollbackToNodeRequest {
  int64 instance_id = 1;
  string target_node_id = 2;
  string env = 3;
}

message RollbackToNodeResponse {
  bool success = 1;
  string message = 2;
}

message GetExecutionTrailRequest {
  int64 instance_id = 1;
}

message GetExecutionTrailResponse {
  int64 instance_id = 1;
  string status = 2;
  string current_state = 3;
  string active_node_ids = 4;
  repeated ExecutionTrailCheckpoint checkpoints = 5;
}

message ExecutionTrailCheckpoint {
  string node_id = 1;
  string node_output_json = 2;
  string state_after_json = 3;
  string created_at = 4;
}

message GetDefRequest {
  string code = 1;
  int32 version = 2;  // 0=最新版本, >0=指定版本
}

message GetDefResponse {
  int64 def_id = 1;
  string code = 2;
  int32 version = 3;
  string name = 4;
  string dag_json = 5;
  bool not_found = 6;
}

message ListDefsRequest {
  string code_like = 1;
  int32 page_num = 2;
  int32 page_size = 3;
}

message ListDefsResponse {
  repeated GetDefResponse items = 1;
  int64 total = 2;
}

message CreateIfNotExistsRequest {
  string code = 1;
  string name = 2;
  string dag_json = 3;
  int32 version = 4;
}

message CreateIfNotExistsResponse {
  int64 def_id = 1;
  bool created = 2;
}

message GetInstanceRequest {
  int64 instance_id = 1;
}

message GetInstanceResponse {
  int64 instance_id = 1;
  int64 def_id = 2;
  string def_code = 3;
  int32 def_version = 4;
  string env = 5;
  string status = 6;
  string initial_state = 7;
  string current_state = 8;
  string active_node_ids = 9;
  string created_at = 10;
  bool not_found = 11;
}

message GetInstanceStatusRequest {
  int64 instance_id = 1;
}

message GetInstanceStatusResponse {
  string status = 1;
  bool not_found = 2;
}

message ListInstancesRequest {
  string def_code = 1;
  string status = 2;
  int64 created_after = 3;
  int64 created_before = 4;
  int32 page_num = 5;
  int32 page_size = 6;
}

message ListInstancesResponse {
  repeated GetInstanceResponse items = 1;
  int64 total = 2;
}

message CancelInstanceRequest {
  int64 instance_id = 1;
}

message CancelInstanceResponse {
  bool success = 1;
  string message = 2;
}

message RetryNodeRequest {
  int64 instance_id = 1;
  string node_id = 2;
}

message RetryNodeResponse {
  bool success = 1;
  string message = 2;
}
